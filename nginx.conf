events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Rate limiting (basic DDoS protection)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream app {
        server app:5000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;           # Replace with your domain e.g. school.example.com

        # Redirect HTTP → HTTPS (uncomment after SSL is configured)
        # return 301 https://$host$request_uri;

        # Proxy everything to the Node app
        location / {
            limit_req zone=api burst=50 nodelay;

            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Larger body for file uploads
            client_max_body_size 55m;
        }
    }

    # HTTPS server block — uncomment and fill in cert paths after running certbot
    # server {
    #     listen 443 ssl http2;
    #     server_name school.example.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/school.example.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/school.example.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location / {
    #         proxy_pass         http://app;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Host $host;
    #         proxy_set_header   X-Real-IP $remote_addr;
    #         proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto https;
    #         client_max_body_size 55m;
    #     }
    # }
}
