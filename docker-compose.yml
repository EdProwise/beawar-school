version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beawar-school-app
    restart: unless-stopped
    expose:
      - "5000"
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/auth/admin-exists"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: beawar-school-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/app/uploads:ro
      # Uncomment after running certbot on the host:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

volumes:
  uploads_data:
